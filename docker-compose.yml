services:
  fail2ban:
    image: crazymax/fail2ban
    volumes:
      - freepbx_logs:/var/log/asterisk:ro
    networks:
      - pbxnet
    cap_add:
      - NET_ADMIN
      - NET_RAW
    deploy:
      restart_policy:
        condition: any

  pbx:
    image: tiredofit/freepbx:latest
    depends_on:
      - fail2ban
      - mail
      - mariadb
      - phpmyadmin
      - redis
      - tts
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      ASTERISK_CORE_MAXLOAD: 0.9
      ASTERISK_CACHE_MEDIA_FRAMES: "yes"
      TTS_SERVER: http://tts:5002
      RTP_START: 10000
      RTP_FINISH: 20000
      LANGUAGE: pt_BR
      ENABLE_XMPP: "true"
      ENABLE_SSL: "true"
      ENABLE_FOP: "true"
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
    volumes:
      - freepbx_etc:/etc/asterisk
      - freepbx_lib:/var/lib/asterisk
      - freepbx_voicemail:/var/spool/asterisk/voicemail
      - freepbx_recordings:/var/spool/asterisk/recordings
      - freepbx_logs:/var/log/asterisk
      - freepbx_sounds:/var/lib/asterisk/sounds
      - /root/remote_code
    networks:
      - pbxnet
    ports:
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - "5160:5160/tcp"
      - "5160:5160/udp"
      - "4569:4569/tcp"
      - "4569:4569/udp"
      - "8000:80"
      - "8443:443"
      - "8001:8001"
      - "8003:8003"
      - "8008-8009:8008-8009"
      - "10000-20000:10000-20000/udp"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 10
        delay: 10s
    tty: true
    stdin_open: true

  mariadb:
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - pbxnet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 10
        delay: 10s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    depends_on: 
      - mariadb
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_PORT: 3306
    networks:
      - pbxnet
    ports:
      - "8002:80"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 10
        delay: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pbxnet
    deploy:
      restart_policy:
        condition: on-failure

  smtp:
    image: bytemark/smtp:latest
    environment:
      RELAY_HOST: ${SMPT_HOST}
      RELAY_PORT: 587
      RELAY_USERNAME: ${SMTP_USER}
      RELAY_PASSWORD: ${SMTP_PASS}
    volumes:
      - smtp_data:/var/mail
    networks:
      - pbxnet
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  tts:
    image: ghcr.io/coqui-ai/tts:latest
    environment:
      OMP_NUM_THREADS: 2
      TTS_USE_GPU: 0        # deshabilita GPU
      TTS_LANG: pt
    command:  >
      python3 TTS/server/server.py
      --model_name tts_models/pt/cv/vits
      --use_cuda false
      --port 5002
    volumes:
      - asterisk_tts_data:/root/.local/share/tts
    ports:
      - "5002:5002"
    networks:
      - pbxnet
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  mariadb_data:
    driver: local
  freepbx_etc:
    driver: local
  freepbx_lib:
    driver: local
  freepbx_voicemail:
    driver: local
  freepbx_recordings:
    driver: local
  freepbx_logs:
    driver: local
  freepbx_sounds:
    driver: local
  phpmyadmin_data:
    driver: local
  asterisk_tts_data:
    driver: local
  redis_data:
    driver: local
  smtp_data:
    driver: local

networks:
  pbxnet:
    external: true
 